<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zema Boutique | بوتیک زِما</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">ZEMA</div>
        <div class="lang-switcher">
            <button class="lang-btn" onclick="changeLang('fa')">FA</button>
            <button class="lang-btn" onclick="changeLang('en')">EN</button>
            <button class="lang-btn" onclick="changeLang('de')">DE</button>
        </div>
    </header>

    <main class="container">
        <div class="product-card">
            <img src="fotos01.jpg" alt="Product 1" class="product-img">
            <div class="product-info">
                <h3 id="p1-title">لباس سنتی مدل آرا</h3>
                <p id="p1-desc">طراحی منحصر به فرد با دوخت دستی</p>
                <span class="price" id="p1-price">€ 45.00</span>
                <button class="order-btn" id="p1-btn">ثبت سفارش</button>
            </div>
        </div>

        <div class="product-card">
            <img src="fotos02.jpg" alt="Product 2" class="product-img">
            <div class="product-info">
                <h3 id="p2-title">شال محلی طرح بهار</h3>
                <p id="p2-desc">پارچه نخی اعلا با رنگ ثابت</p>
                <span class="price" id="p2-price">€ 15.00</span>
                <button class="order-btn" id="p2-btn">ثبت سفارش</button>
            </div>
        </div>

        <div class="product-card">
            <img src="fotos03.jpg" alt="Product 3" class="product-img">
            <div class="product-info">
                <h3 id="p3-title">جلیقه سنتی</h3>
                <p id="p3-desc">مناسب برای ست کردن با انواع لباس</p>
                <span class="price" id="p3-price">€ 30.00</span>
                <button class="order-btn" id="p3-btn">ثبت سفارش</button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>

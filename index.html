<!DOCTYPE html>
<html lang="fa" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zema Boutique | بوتیک زما</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header class="main-header">
        <div class="logo">ZEMA</div>
        <div class="lang-switcher">
            <button class="lang-btn">FA</button>
            <button class="lang-btn">EN</button>
            <button class="lang-btn">DE</button>
        </div>
    </header>

    <main class="container">
        <div class="product-card">
            <img src="fotos01.jpg" alt="لباس محلی ۱" class="product-img">
            <div class="product-info">
                <h3>لباس سنتی مدل آرا</h3>
                <p>طراحی منحصر به فرد با دوخت دستی</p>
                <span class="price">۴۰۰ یورو</span>
                <button class="order-btn">ثبت سفارش (تلگرام)</button>
            </div>
        </div>

        <div class="product-card">
            <img src="fotos02.jpg" alt="لباس محلی ۲" class="product-img">
            <div class="product-info">
                <h3>شال محلی طرح بهار</h3>
                <p>پارچه نخی اعلا، رنگ ثابت</p>
                <span class="price">۴۵۰ یورو</span>
                <button class="order-btn">ثبت سفارش (تلگرام)</button>
            </div>
        </div>

        <div class="product-card">
            <img src="fotos03.jpg" alt="لباس محلی ۳" class="product-img">
            <div class="product-info">
                <h3>لباس محلی زیبا</h3>
                <p>پارچه های اصل عربی</p>
                <span class="price">۳۲۰ یورو</span>
                <button class="order-btn">(تلگرام) ثبت سفارش تلگرام</button>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
